version: '3'

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list

  build:
    desc: "Build the ISO locally (EDITION=anvil|atelier, default: anvil)"
    cmds:
      - EDITION=${EDITION:-anvil} bash scripts/build-iso.sh

  clean:
    desc: "Clean live-build artifacts"
    cmds:
      - |
        docker run --rm -v "$(pwd):/work" -w /work/config ubuntu:26.04 \
          bash -c 'apt-get install -y live-build -qq && lb clean --purge'
        rm -rf dist/

  smoke:
    desc: "Boot the locally-built ISO in QEMU (EDITION=anvil|atelier, default: anvil)"
    cmds:
      - bash test/boot-smoke.sh dist/foundry-${EDITION:-anvil}-1.0-amd64.iso

  sign:
    desc: "GPG-sign + SHA-256 the locally-built ISO (EDITION=anvil|atelier)"
    cmds:
      - EDITION=${EDITION:-anvil} bash scripts/sign-iso.sh

  generate-index:
    desc: "Generate dist/index.html from dist/manifest-*.json"
    cmds:
      - bash scripts/generate-iso-index.sh

  upload-index:
    desc: "Upload dist/index.html to the foundry-iso R2 bucket"
    cmds:
      - bash scripts/upload-iso-index.sh

  build-vms:
    desc: "Build VM images (qcow2, VMDK, OVA) from the anvil ISO"
    cmds:
      - bash scripts/build-vm-images.sh

  upload-vms:
    desc: "Upload VM images to R2 (loads creds from .foundry/bootstrap.env)"
    cmds:
      - bash scripts/upload-vm-images.sh

  iso-list:
    desc: "List ISOs in R2 and local dist/"
    cmds:
      - bash scripts/list-isos.sh

  iso-prune:
    desc: "Prune versioned ISOs from R2 (dry-run by default). Use KEEP=N or BEFORE=YYYY-MM-DD; set DRY_RUN=0 to apply."
    cmds:
      - bash scripts/prune-isos.sh

  bootstrap-r2:
    desc: "One-time: create foundry-iso R2 bucket + iso.foundrylinux.org binding (requires CF_API_TOKEN)"
    cmds:
      - bash scripts/bootstrap-r2.sh
