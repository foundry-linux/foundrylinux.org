<svg xmlns="http://www.w3.org/2000/svg" viewBox="30 30 340 260">
  <defs>
    <clipPath id="L"><rect x="0"   y="0" width="200" height="320"/></clipPath>
    <clipPath id="R"><rect x="200" y="0" width="200" height="320"/></clipPath>
  </defs>

  <!-- lit half: white fill -->
  <g clip-path="url(#L)">
    <path fill="white"
      d="M 64 40 L 336 40 L 336 116 L 252 116 L 252 198 L 360 198 L 360 282 L 40 282 L 40 198 L 148 198 L 148 116 L 64 116 Z"/>
    <rect x="184" y="60" width="18" height="18" fill="black"/>
    <circle cx="232" cy="69" r="6" fill="black"/>
  </g>

  <!-- shadow half: black fill + white outline -->
  <g clip-path="url(#R)">
    <path fill="black" stroke="white" stroke-width="2" stroke-linejoin="miter"
      d="M 64 40 L 336 40 L 336 116 L 252 116 L 252 198 L 360 198 L 360 282 L 40 282 L 40 198 L 148 198 L 148 116 L 64 116 Z"/>
  </g>

  <!-- centre seam highlight -->
  <line x1="200" y1="40"  x2="200" y2="116" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="200" y1="116" x2="200" y2="198" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="198" x2="200" y2="282" stroke="white" stroke-width="1" opacity="0.6"/>
</svg>
