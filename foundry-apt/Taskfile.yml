version: '3'

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list

  build:
    desc: "Build .debs into dist/ (PKG=name to build one; skips already-current packages)"
    cmds:
      - bash scripts/build-all.sh {{.PKG}}

  dist-prune:
    desc: "Remove old versions from dist/, keeping only the newest build per package"
    cmds:
      - |
        set -euo pipefail
        shopt -s nullglob
        declare -A newest
        # First pass: find the newest .deb per package name.
        for deb in dist/*.deb; do
          pkg=$(dpkg-deb --field "$deb" Package)
          if [[ -z "${newest[$pkg]:-}" ]]; then
            newest[$pkg]="$deb"
          else
            cur_ver=$(dpkg-deb --field "${newest[$pkg]}" Version)
            this_ver=$(dpkg-deb --field "$deb" Version)
            if dpkg --compare-versions "$this_ver" gt "$cur_ver"; then
              newest[$pkg]="$deb"
            fi
          fi
        done
        # Second pass: delete anything that isn't the newest.
        removed=0
        for deb in dist/*.deb; do
          pkg=$(dpkg-deb --field "$deb" Package)
          if [[ "$deb" != "${newest[$pkg]}" ]]; then
            echo "Removing: $(basename "$deb")"
            rm "$deb"
            (( removed++ )) || true
          fi
        done
        [[ $removed -eq 0 ]] && echo "dist/: nothing to prune." || echo "Pruned $removed old .deb(s)."

  clean:
    desc: "Remove dist/ and public/"
    cmds:
      - rm -rf dist public

  publish-local:
    desc: "Build + publish to ./public/ via aptly (unsigned, smoke test only)"
    deps: [build]
    cmds:
      - bash scripts/init-repo.sh
      - bash scripts/publish-local.sh

  verify:
    desc: "dpkg-deb --info every built .deb"
    deps: [build]
    cmds:
      - |
        for f in dist/*.deb; do
          echo "=== $f ==="
          dpkg-deb --info "$f" | head -20
        done

  generate-meta:
    desc: "Generate public/meta/{name}.json for all packages (PKG=name for one; skips up-to-date)"
    cmds:
      - bash scripts/generate-meta.sh {{.PKG}}

  generate-index:
    desc: "Generate public/index.html from public/meta/*.json"
    deps: [publish-local, generate-meta]
    cmds:
      - bash scripts/generate-index.sh

  apt-test:
    desc: "After publish-local, point apt at ./public/ and resolve packages"
    deps: [publish-local]
    cmds:
      - |
        echo "deb [trusted=yes] file://$(pwd)/public resolute main" \
          | sudo tee /etc/apt/sources.list.d/foundry-test.list
        sudo apt-get update -o Dir::Etc::sourceparts=- \
                            -o APT::Get::List-Cleanup=0 || true
        apt-cache depends foundry-retro-tools
        sudo rm /etc/apt/sources.list.d/foundry-test.list

  live-test:
    desc: "Install each published package from apt.foundrylinux.org in a fresh container"
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - bash test/run-test.sh {{.CLI_ARGS}}

  shellcheck:
    desc: "Lint all shell scripts"
    cmds:
      - shellcheck scripts/*.sh packages/*/build.sh 2>/dev/null || shellcheck scripts/*.sh

  check-licenses:
    desc: "Verify every packages/*/build.sh has an entry in LICENSES-VENDORED.md"
    cmds:
      - bash scripts/check-licenses-vendored.sh

  check-badges:
    desc: "Verify every packages/*/build.sh declares X-Repology-Project (apt-index Repology badge)"
    cmds:
      - bash scripts/check-repology-badges.sh
