# foundry-linux.yaml — Repology rules for the Foundry Linux repo (apt.foundrylinux.org).
# GENERATED by foundry-apt/scripts/generate-repology-ruleset.sh from each
# packages/*/debian/control X-Repology-Project field — do not hand-edit; regenerate.
#
# Submit to github.com/repology/repology-rules alongside the repos.d/deb entry
# (ruleset: [debuntu, foundry_linux]). Every rule is scoped 'ruleset: foundry_linux'.

# ── name remaps: our source package → canonical Repology project ──
- { ruleset: foundry_linux, name: [mesen2], setname: "mesen" }
- { ruleset: foundry_linux, name: [python3-glfw], setname: "python:glfw" }
- { ruleset: foundry_linux, name: [python3-inators], setname: "python:inators" }
- { ruleset: foundry_linux, name: [python3-librosa], setname: "python:librosa" }
- { ruleset: foundry_linux, name: [python3-mss], setname: "python:mss" }
- { ruleset: foundry_linux, name: [python3-picire], setname: "python:picire" }
- { ruleset: foundry_linux, name: [python3-pydub], setname: "python:pydub" }
- { ruleset: foundry_linux, name: [snes9x-gtk], setname: "snes9x" }
- { ruleset: foundry_linux, name: [task], setname: "go-task" }

# ── remove: Foundry-authored metapackages (not real upstream projects) ──
- { ruleset: foundry_linux, remove: true, name: [calamares-settings-foundry-linux, foundry-android-development, foundry-anvil, foundry-art, foundry-atelier, foundry-core, foundry-cv, foundry-daw, foundry-desktop, foundry-emulators, foundry-emulators-computers, foundry-emulators-consoles, foundry-emulators-consoles-heavy, foundry-emulators-vintage, foundry-free-games, foundry-game-frameworks, foundry-game-reimplementations, foundry-image-cli, foundry-ios-development, foundry-kde-theme, foundry-pixel-art, foundry-python-gamedev, foundry-python-gamedev-extras, foundry-retro-tools, foundry-sprite, foundry-trackers] }

# ── remove: tools verified not tracked on Repology (X-Repology-Project: none).
#    Flip the package's X-Repology-Project to a real slug if it ever lands there. ──
- { ruleset: foundry_linux, remove: true, name: [blender-asset-finder, blender-asset-finder-cli, drmon, foundry-welcome, m8te] }
