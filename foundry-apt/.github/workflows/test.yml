name: Build .debs (PR)

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-debs:
    name: Build every metapackage with dpkg-deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            shellcheck \
            build-essential debhelper dpkg-dev devscripts fakeroot lintian

      - name: shellcheck scripts
        run: |
          shellcheck scripts/*.sh
          find packages -name '*.sh' -exec shellcheck {} +

      - name: Build all .debs
        run: bash scripts/build-all.sh

      - name: Verify all .debs
        run: |
          set -euo pipefail
          for deb in dist/*.deb; do
            echo "=== $deb ==="
            dpkg-deb --info "$deb"
          done

      - name: Upload built .debs
        uses: actions/upload-artifact@v7
        with:
          name: foundry-apt-debs
          path: dist/*.deb
          retention-days: 14
