name: Build .debs (PR)

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-debs:
    name: Build every metapackage with dpkg-deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install runner-side deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y shellcheck

      - name: shellcheck scripts
        run: |
          shellcheck scripts/*.sh
          find packages -name '*.sh' -exec shellcheck {} +

      - name: Build all .debs in ubuntu:26.04 (our distribution base)
        # .debs must be built against 26.04's libraries so dpkg-shlibdeps
        # resolves the correct sonames — see publish.yml for the full
        # rationale.
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:26.04 \
            bash -c '
              set -euo pipefail
              apt-get update -q
              apt-get install -y --no-install-recommends \
                build-essential debhelper dpkg-dev devscripts fakeroot lintian \
                curl ca-certificates pkg-config sudo
              bash scripts/build-all.sh
            '

      - name: Verify all .debs
        run: |
          set -euo pipefail
          for deb in dist/*.deb; do
            echo "=== $deb ==="
            dpkg-deb --info "$deb"
          done

      - name: Upload built .debs
        uses: actions/upload-artifact@v7
        with:
          name: foundry-apt-debs
          path: dist/*.deb
          retention-days: 14
