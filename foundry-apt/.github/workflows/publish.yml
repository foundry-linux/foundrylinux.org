name: Build, sign, and publish APT repo

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + sign only; do not upload to R2'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install aptly
        run: |
          sudo apt-get update -q
          sudo apt-get install -y aptly gnupg rclone

      - name: Build all .debs
        run: bash scripts/build-all.sh

      - name: Initialise aptly repo
        run: bash scripts/init-repo.sh

      - name: Publish to ./public/ (unsigned smoke step)
        env:
          GPG_KEY: ''   # signing happens in the next step
        run: bash scripts/publish-local.sh

      - name: Sign Release
        if: ${{ !inputs.dry_run }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          PUBLISH_DIR: ./public/dists/resolute
        run: bash scripts/sign.sh

      - name: Export public key into repo root
        if: ${{ !inputs.dry_run }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --export --armor > ./public/key.gpg

      - name: Sync to Cloudflare R2
        if: ${{ !inputs.dry_run }}
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          RCLONE_CONFIG_R2_REGION: auto
        run: |
          rclone sync ./public/ R2:foundry-apt/ \
            --progress \
            --transfers=8 \
            --checksum

      - name: Upload artifacts (always, for audit)
        uses: actions/upload-artifact@v4
        with:
          name: apt-repo-${{ github.ref_name }}
          path: public/
          retention-days: 30

  smoke-install:
    name: Smoke-install worldfoundry-engine-build-deps in Ubuntu 26.04
    needs: build-and-publish
    if: github.event_name == 'push'   # tag pushes only
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04
    steps:
      - name: Install from the freshly-published repo
        run: |
          apt-get update -q
          apt-get install -y curl gnupg ca-certificates
          curl -fsSL https://apt.foundrylinux.org/key.gpg \
            | gpg --dearmor -o /etc/apt/keyrings/foundry.gpg
          echo "deb [signed-by=/etc/apt/keyrings/foundry.gpg] https://apt.foundrylinux.org resolute main" \
            > /etc/apt/sources.list.d/foundry.list
          apt-get update -q
          apt-cache show worldfoundry-engine-build-deps
          apt-get install -y --no-install-recommends --download-only worldfoundry-engine-build-deps
