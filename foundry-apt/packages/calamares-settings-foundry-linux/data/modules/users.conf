---
# Foundry Linux — Calamares users module.

# Groups the new user joins (also silences Calamares' "Using fallback groups"
# warning). Standard Kubuntu desktop set.
defaultGroups:
    - adm
    - cdrom
    - dip
    - lpadmin
    - plugdev
    - sudo
    - audio
    - video
    - netdev

sudoersGroup: sudo

# setRootPassword: false — do NOT touch the root account during install. This
# preserves the root:foundry password set in the squashfs by the live-ssh debug
# hook (foundry-iso/config/hooks/1200-live-ssh.hook.chroot), so the INSTALLED
# system keeps `ssh root@host` (password: foundry) for debugging — same access
# the live session has. Without this, Calamares locks/resets root on install
# (Ubuntu's sudo-only default) and SSH to the target stops working.
#
#   ⚠ DEBUG/TEST ONLY — a known root password baked into every install is a
#   backdoor. This rides on the same pre-release gate as the live-ssh debug hook:
#   remove BOTH before any public release. See TODO.md.
setRootPassword: false
