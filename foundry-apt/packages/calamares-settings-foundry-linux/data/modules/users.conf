---
# Foundry Linux — Calamares users module.

# Groups the new user joins (also silences Calamares' "Using fallback groups"
# warning). Standard Kubuntu desktop set.
defaultGroups:
    - adm
    - cdrom
    - dip
    - lpadmin
    - plugdev
    - sudo
    - audio
    - video
    - netdev

sudoersGroup: sudo

# Root is managed by Calamares the normal way (default setRootPassword: true):
# the installer's admin-password UI is shown and root is set/locked per the
# user's choice. We deliberately do NOT preserve the squashfs root:foundry
# debug password onto the installed system — a known root password baked into
# every install is a backdoor and must never ship. (The live-ssh debug hook's
# root:foundry stays live-session-only and is itself gated for removal before
# release — see TODO.md.)
