---
# Enable sshd on the INSTALLED system so the user can SSH in with the account
# they created during installation (e.g. will/<their password>). The
# services-systemd module is already in settings.conf's exec sequence.
#
# sshd is intentionally NOT enabled on the live session (see the foundry-iso
# 0035-install-ssh-server hook): the live 'user' account has passwordless sudo,
# so a live sshd would be an instant-root hole. No credential is baked — Ubuntu's
# default sshd refuses root password login (PermitRootLogin prohibit-password),
# so only the install-created user can log in, with the password they chose.
services:
  - name: ssh.socket
    mandatory: false
