---
# Bind-mount /dev, /proc, /sys, /run into the target chroot so grub-install
# can find block devices and EFI variables. Without these, grub-install exits
# "cannot find a device for /boot/efi" because /dev has no block nodes in
# the Calamares-managed chroot.
extraMounts:
    - device: /dev
      fs:     ""
      mountPoint: /dev
      options: bind
    - device: /dev/pts
      fs:     devpts
      mountPoint: /dev/pts
      options: gid=5,mode=620
    - device: proc
      fs:     proc
      mountPoint: /proc
      options: ""
    - device: sysfs
      fs:     sysfs
      mountPoint: /sys
      options: ""
    - device: tmpfs
      fs:     tmpfs
      mountPoint: /run
      options: ""

extraMountsEfi:
    - device: /sys/firmware/efi/efivars
      fs:     efivarfs
      mountPoint: /sys/firmware/efi/efivars
      options: ""
