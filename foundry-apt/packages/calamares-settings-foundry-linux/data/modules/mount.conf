---
# Bind-mount /dev, /proc, /sys, /run into the target chroot so grub-install
# can find block devices and EFI variables. Without these, grub-install exits
# with error code 1 because /dev has no block nodes in the chroot.
#
# Schema: options MUST be a YAML array (["bind"], not "bind") — Calamares
# calls ",".join(options) and schema validation rejects the whole extraMounts
# block if any entry has a scalar instead of a list.
# The efivarfs entry uses efi:true (not a separate extraMountsEfi: key —
# that key does not exist in the Calamares 3.3 mount module schema).
extraMounts:
    - device: /dev
      mountPoint: /dev
      options: ["bind"]
    - device: /dev/pts
      fs:     devpts
      mountPoint: /dev/pts
      options: ["gid=5", "mode=620"]
    - device: proc
      fs:     proc
      mountPoint: /proc
    - device: sysfs
      fs:     sysfs
      mountPoint: /sys
    - device: tmpfs
      fs:     tmpfs
      mountPoint: /run
    - device: /sys/firmware/efi/efivars
      fs:     efivarfs
      mountPoint: /sys/firmware/efi/efivars
      efi:    true
