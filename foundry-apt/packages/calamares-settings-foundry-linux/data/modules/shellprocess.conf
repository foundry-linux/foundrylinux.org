---
# Run in the installed target (chroot: true), not on the live system.
# Removes live-session-only artifacts before the users module creates
# the new user from /etc/skel — so the installer icon never lands in
# the installed user's ~/Desktop.
chroot: true

script:
    - "-rm -f /usr/share/applications/install-foundry-linux.desktop"
    - "-rm -f /etc/skel/Desktop/install-foundry-linux.desktop"
    - "-rmdir /etc/skel/Desktop 2>/dev/null || true"
    - "-rm -f /usr/local/bin/launch-calamares.sh"
    - "-rm -f /usr/local/bin/foundry-autoinstall.sh"
    - "-rm -f /etc/xdg/autostart/foundry-autoinstall.desktop"
