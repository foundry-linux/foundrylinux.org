---
# unpackfsc (C++ qtplugin) reads source/sourcefs/destination directly from
# the top-level map via setConfigurationMap(). It does NOT iterate the
# unpack: list that unpackfs (Python) uses — passing { "unpack": [...] }
# causes it to log "Skipping item with bad source data" and return ok()
# without extracting anything. Flat format only.
source: /cdrom/live/filesystem.squashfs
sourcefs: squashfs
destination: "/"
