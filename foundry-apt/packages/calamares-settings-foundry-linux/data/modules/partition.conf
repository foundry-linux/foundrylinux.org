defaultFileSystemType: "ext4"
eraseModeFilesystem:   "ext4"
initialSwapChoice:     "none"
# Single-entry list = no swap chooser UI. Calamares shows the swap combo box
# only when userSwapChoices has MORE THAN ONE entry; an EMPTY [] is treated as
# "unconfigured" and falls back to Calamares' built-in choices (none + suspend),
# which is why a dropdown appeared. One entry forces no-swap and hides the combo.
# (No-swap default is deliberate: hibernate is blocked under Secure Boot — which
# Foundry ships via shim-signed — by Ubuntu kernel lockdown, and "suspend" swap
# is RAM-sized. See the swap research note in the 2026-06-09 plan.)
userSwapChoices:
    - none

efi:
    mountPoint:      "/boot/efi"
    recommendedSize: 300MiB
    minimumSize:     32MiB

# partitionLayout is REQUIRED in Calamares 3.3 — without it (or without the
# mandatory "name" key in each entry) PartitionLayout::init() silently switches
# to a default layout that creates NO root partition, so unsquashfs extracts to
# the live tmpfs and fails with exit code 1.
partitionLayout:
  - name:        "root"
    filesystem:  "ext4"
    mountPoint:  "/"
    size:        100%
