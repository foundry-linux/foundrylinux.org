# Calamares partition module configuration.
#
# defaultFileSystemType must be set explicitly — without it Calamares leaves
# the root filesystem type as "unknown" and the auto-partitioner creates only
# EFI + swap with no root partition, causing unsquashfs to fail with exit 1.
defaultFileSystemType: "ext4"

# Use a swapfile rather than a swap partition so the auto-partitioner creates
# EFI + root only (no separate swap partition shrinking the root).
initialSwapChoice: "none"
