defaultFileSystemType: "ext4"
eraseModeFilesystem:   "ext4"
initialSwapChoice:     "none"
userSwapChoices:       []

efi:
    mountPoint:      "/boot/efi"
    recommendedSize: 300MiB
    minimumSize:     32MiB

# partitionLayout is REQUIRED in Calamares 3.3 — without it (or without the
# mandatory "name" key in each entry) PartitionLayout::init() silently switches
# to a default layout that creates NO root partition, so unsquashfs extracts to
# the live tmpfs and fails with exit code 1.
partitionLayout:
  - name:        "root"
    filesystem:  "ext4"
    mountPoint:  "/"
    size:        100%
