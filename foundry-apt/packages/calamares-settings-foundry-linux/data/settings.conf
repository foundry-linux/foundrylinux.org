# Calamares module sequence for Foundry Linux
---
modules-search: [ local, /usr/lib/calamares/modules ]

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfsc
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - shellprocess
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - services-systemd
    - grubcfg
    - packages
    - bootloader
    - removeuser
    - umount
  - show:
    - finished

branding: foundry-linux
prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: false
quit-at-end: false
