name: install.sh tests

on:
  push:
    paths:
      - 'foundry-linux-setup/**'
      - '.github/workflows/foundry-linux-setup-test.yml'
  pull_request:
    paths:
      - 'foundry-linux-setup/**'

jobs:
  shellcheck:
    name: shellcheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          cd foundry-linux-setup
          shellcheck install.sh test/run-test.sh

  dry-run:
    name: Dry-run on ${{ matrix.ubuntu }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ['24.04', '26.04']
    steps:
      - uses: actions/checkout@v4
      - name: Build test image
        working-directory: foundry-linux-setup
        run: |
          docker build -f test/Dockerfile.ubuntu${{ matrix.ubuntu }} \
                       -t foundry-test:${{ matrix.ubuntu }} .
      - name: Dry-run install
        working-directory: foundry-linux-setup
        run: |
          if [ "${{ matrix.ubuntu }}" = "24.04" ]; then
            docker run --rm foundry-test:${{ matrix.ubuntu }} --dry-run --allow-24.04
          else
            docker run --rm foundry-test:${{ matrix.ubuntu }} --dry-run
          fi

  full-install:
    name: Full install on Ubuntu 26.04 (engine-dev, skip-clone)
    runs-on: ubuntu-latest
    needs: dry-run
    # Only run on main / tagged releases; full-install is slow (~5–10 min)
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Build Ubuntu 26.04 test image
        working-directory: foundry-linux-setup
        run: docker build -f test/Dockerfile.ubuntu26.04 -t foundry-test:26.04 .
      - name: Full install (skip clone + blender to keep it self-contained)
        working-directory: foundry-linux-setup
        run: |
          docker run --rm foundry-test:26.04 \
            --role engine-dev --skip-clone --skip-blender
