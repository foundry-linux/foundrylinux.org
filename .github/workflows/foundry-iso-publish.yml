name: Build and publish foundry-iso

on:
  # Auto-triggers disabled — builds run locally until post-1.0 CI cleanup.
  # See TODO.md: "Restore foundry-iso CI triggers after 1.0 ships".
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only; do not sign or upload to R2'
        type: boolean
        default: true

permissions:
  contents: write              # attach sig + checksum to GH Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        edition: [anvil]
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          overprovision-lvm: 'true'

      - uses: actions/checkout@v6

      - name: Install host dependencies
        run: sudo apt-get install -y xorriso

      - name: Build ISO in ubuntu:26.04
        env:
          EDITION: ${{ matrix.edition }}
        run: bash foundry-iso/scripts/build-iso.sh

      - name: Sign + checksum
        if: ${{ !inputs.dry_run }}
        env:
          EDITION: ${{ matrix.edition }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE  }}
        run: bash foundry-iso/scripts/sign-iso.sh

      - name: Upload ISO to R2
        if: ${{ !inputs.dry_run }}
        env:
          EDITION:              ${{ matrix.edition }}
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: bash foundry-iso/scripts/upload-iso.sh

      - name: Attach signature + checksum to GH Release
        if: ${{ !inputs.dry_run && startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/foundry-${{ matrix.edition }}-*.iso.sha256
            dist/foundry-${{ matrix.edition }}-*.iso.asc
            dist/manifest-${{ matrix.edition }}.json

      - name: Save manifest for index job
        uses: actions/upload-artifact@v7
        with:
          name: manifest-${{ matrix.edition }}
          path: dist/manifest-${{ matrix.edition }}.json
          retention-days: 1

  index:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download manifests
        uses: actions/download-artifact@v7
        with:
          pattern: manifest-*
          path: dist/
          merge-multiple: true

      - name: Generate index.html
        run: bash foundry-iso/scripts/generate-iso-index.sh

      - name: Upload index to R2
        if: ${{ !inputs.dry_run }}
        env:
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: bash foundry-iso/scripts/upload-iso-index.sh
