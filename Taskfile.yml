version: '3'

vars:
  GH_REPO: foundry-linux/foundry-apt
  SRC_DIR: foundry-apt
  WORK_DIR: /tmp/foundry-apt-sync

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  dev-setup:
    desc: "Install all tools needed to develop this repo (run once after checkout)"
    cmds:
      - |
        set -euo pipefail
        APT_PKGS=(docker.io gh shellcheck aptly dpkg-dev debhelper jq distrobox python3 curl)
        MISSING=()
        for pkg in "${APT_PKGS[@]}"; do
          dpkg-query -W -f='${Status}' "$pkg" 2>/dev/null | grep -q 'install ok installed' || MISSING+=("$pkg")
        done
        if (( ${#MISSING[@]} > 0 )); then
          echo "=== apt: installing ${MISSING[*]} ==="
          sudo apt-get update -qq || echo "  warning: apt-get update had errors; continuing with cached lists"
          sudo apt-get install -y --no-install-recommends "${MISSING[@]}"
        else
          echo "=== apt: all system packages already installed ==="
        fi
        if ! command -v task &>/dev/null; then
          echo "=== task (go-task): installing ==="
          bash foundry-setup/install-task.sh
        fi
        if [[ ! -d node_modules ]]; then
          echo "=== npm install ==="
          npm install
        fi
        echo "All done. Run 'task' to see available tasks."

  md:
    desc: "Preview a markdown file in the browser"
    cmds:
      - bash ../python-tui-lib/scripts/md-to-pdf.sh {{.CLI_ARGS}}

  audit-apt-repos:
    desc: "Regenerate docs/investigations/<today>-package-inventory.md from live state of both apt repos + local source trees, then open in browser"
    cmds:
      - |
        set -euo pipefail
        OUT="docs/investigations/$(date +%F)-package-inventory.md"
        bash scripts/audit-apt-repos.sh -o "$OUT"
        echo "Wrote $OUT"
        bash ../python-tui-lib/scripts/md-to-pdf.sh "$OUT"

  sync:
    desc: "Sync foundry-apt/ to github.com/{{.GH_REPO}} and push"
    cmds:
      - |
        set -euo pipefail
        rm -rf {{.WORK_DIR}}
        gh repo clone {{.GH_REPO}} {{.WORK_DIR}}
        # Wipe everything in the clone except .git/ so renames and deletions
        # propagate cleanly. Without this, removing a package dir in
        # foundry-apt/ would leave the orphaned dir behind on the remote
        # (caught 2026-05-21 — the foundry-linux-* → foundry-* rename left
        # old source dirs behind, CI built both, Packages.gz indexed both).
        find {{.WORK_DIR}} -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
        # Export only committed content from foundry-apt/ (respects .gitignore;
        # avoids syncing local build artifacts like debian/.debhelper/, *.deb, etc.)
        git archive HEAD -- {{.SRC_DIR}}/ \
          | tar --strip-components=1 -x -C {{.WORK_DIR}}/
        cd {{.WORK_DIR}}
        # `git diff` only sees modified files, not new untracked dirs — `git
        # status --porcelain` covers both. Without this fix, adding a brand-new
        # package directory silently bailed out as "nothing to sync".
        if [[ -z "$(git status --porcelain)" ]]; then
          echo "Nothing to sync — remote is already up to date."
          exit 0
        fi
        git add -A
        git commit -m "chore: sync from foundrylinux.org $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        git push

  release:
    desc: "Tag and push a release to trigger publish.yml (usage: task release TAG=v0.1.0)"
    requires:
      vars: [TAG]
    cmds:
      - |
        set -euo pipefail
        if [[ ! -d {{.WORK_DIR}}/.git ]]; then
          echo "Run 'task sync' first to clone the repo." >&2
          exit 1
        fi
        cd {{.WORK_DIR}}
        git pull --ff-only
        git tag {{.TAG}}
        git push origin {{.TAG}}
        echo "Tagged {{.TAG}} — watch: https://github.com/{{.GH_REPO}}/actions"

  sync-and-release:
    desc: "Sync then tag a release (usage: task sync-and-release TAG=v0.1.0)"
    requires:
      vars: [TAG]
    cmds:
      - task: sync
      - task: release
        vars: { TAG: '{{.TAG}}' }

  secrets:
    desc: "List secret names on github.com/{{.GH_REPO}}"
    cmds:
      - gh secret list --repo {{.GH_REPO}}

  lh-report:
    desc: "Print Lighthouse score table. Default: /tmp/lh/latest/. Args: lh-report v0.0.29 | lh-report path/to/file.json"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - bash scripts/lh-report.sh {{.CLI_ARGS}}

  lighthouse:
    desc: "Run Lighthouse against https://foundrylinux.org, RUNS=${RUNS:-3} runs, devtools throttling. Reports under /tmp/lh/latest/."
    dir: "{{.ROOT_DIR}}"
    cmds:
      - |
        set -euo pipefail
        mkdir -p /tmp/lh/latest
        RUNS=${RUNS:-3}

        URLS=(
          "https://foundrylinux.org/|home"
        )
        SLUGS=(); for pair in "${URLS[@]}"; do SLUGS+=( "${pair#*|}" ); done

        for pair in "${URLS[@]}"; do
          URL="${pair%|*}"; SLUG="${pair#*|}"
          for RUN in $(seq 1 "$RUNS"); do
            TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            echo "[$TS] === ${SLUG} run ${RUN} ==="
            npx --yes lighthouse@13.3.0 "$URL" \
              --form-factor=mobile \
              --throttling-method=devtools \
              --chrome-flags="--headless=new --no-sandbox --disable-gpu" \
              --quiet --output=json \
              --output-path="/tmp/lh/latest/${SLUG}.run-${RUN}.report.json"
          done
        done
        echo
        echo "=== devtools / n=${RUNS} / scores per run ==="
        printf "%-30s %-3s %-4s %-4s %-4s %-5s %-6s %-5s %s\n" "page" "run" "perf" "a11y" "bp" "fcp" "lcp" "tbt" "cls"
        for SLUG in "${SLUGS[@]}"; do
          for RUN in $(seq 1 "$RUNS"); do
            jq -r --arg slug "$SLUG" --arg run "$RUN" '
              [$slug, $run,
               (.categories.performance.score*100|round|tostring),
               (.categories.accessibility.score*100|round|tostring),
               (.categories["best-practices"].score*100|round|tostring),
               .audits["first-contentful-paint"].displayValue,
               .audits["largest-contentful-paint"].displayValue,
               .audits["total-blocking-time"].displayValue,
               .audits["cumulative-layout-shift"].displayValue
              ] | @tsv' "/tmp/lh/latest/${SLUG}.run-${RUN}.report.json"
          done
        done | column -t -s $'\t'
        echo
        if [ "$RUNS" -gt 1 ]; then
          echo "=== Perf medians (n=${RUNS}) ==="
        else
          echo "=== Perf scores (n=1) ==="
        fi
        for SLUG in "${SLUGS[@]}"; do
          PERF=()
          for RUN in $(seq 1 "$RUNS"); do
            PERF+=( "$(jq -r '(.categories.performance.score*100)|round' \
              /tmp/lh/latest/${SLUG}.run-${RUN}.report.json)" )
          done
          MED=$(printf '%s\n' "${PERF[@]}" | sort -n | sed -n $(( (RUNS + 1) / 2 ))p)
          printf "  %-30s  %d\n" "$SLUG" "$MED"
        done

  packages-page:
    desc: "Regenerate site/packages-data.json from live Packages.gz (~3 s, pure Node)"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - bash scripts/build-packages-page.sh {{.CLI_ARGS}}

  site-build:
    desc: SSR-render site/*.jsx → fully-static site/index.html + site/packages.html (no React runtime)
    dir: "{{.ROOT_DIR}}"
    deps: [packages-page]
    cmds:
      - node scripts/ssr-render.js

  link-check:
    desc: "Check all links in built HTML (--skip-external to skip HTTP checks)"
    dir: "{{.ROOT_DIR}}"
    deps: [site-build]
    cmds:
      - node scripts/check-links.js {{.CLI_ARGS}}

  site-deploy:
    desc: "Deploy site/ to Cloudflare Pages (requires CLOUDFLARE_API_TOKEN)"
    cmds:
      - npx --yes wrangler pages deploy site/ --project-name foundrylinux-org --branch main

  bump:
    desc: "Sync and auto-increment patch version (e.g. v0.0.3 → v0.0.4)"
    cmds:
      # Pass through GH_REPO/SRC_DIR/WORK_DIR so devbox-bump (which calls
      # bump with overrides) actually syncs the foundry-devbox tree, not
      # foundry-apt. Task var overrides don't transitively cascade through
      # the second `task:` hop, so we re-thread them explicitly.
      - task: sync
        vars:
          GH_REPO:  '{{.GH_REPO}}'
          SRC_DIR:  '{{.SRC_DIR}}'
          WORK_DIR: '{{.WORK_DIR}}'
      - |
        set -euo pipefail
        cd {{.WORK_DIR}}
        # Find highest vX.Y.Z tag; default to v0.0.0 if none
        LATEST=$(git tag --list 'v*.*.*' | sort -V | tail -1)
        LATEST="${LATEST:-v0.0.0}"
        # Split into parts and increment patch
        IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
        NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
        echo "Latest tag: ${LATEST}  →  next: ${NEXT}"
        git tag "${NEXT}"
        git push origin "${NEXT}"
        echo "Tagged ${NEXT} — watch: https://github.com/{{.GH_REPO}}/actions"

  # ─────────────────────────────────────────────────────────────────────
  # foundry-devbox/ — mirror to github.com/foundry-linux/foundry-devbox.
  # Each task reuses sync/release/bump above with var overrides; no
  # logic is duplicated. Same numbering convention as foundry-apt
  # (v0.0.x patch bumps).
  # ─────────────────────────────────────────────────────────────────────

  devbox-sync:
    desc: "Sync foundry-devbox/ to github.com/foundry-linux/foundry-devbox and push"
    cmds:
      - task: sync
        vars:
          GH_REPO: foundry-linux/foundry-devbox
          SRC_DIR: foundry-devbox
          WORK_DIR: /tmp/foundry-devbox-sync

  devbox-release:
    desc: "Tag and push a release to trigger GHCR publish (usage: task devbox-release TAG=v0.0.1)"
    requires:
      vars: [TAG]
    cmds:
      - task: release
        vars:
          TAG: '{{.TAG}}'
          GH_REPO: foundry-linux/foundry-devbox
          WORK_DIR: /tmp/foundry-devbox-sync

  devbox-bump:
    desc: "Sync and auto-increment patch tag on foundry-devbox (e.g. v0.0.3 → v0.0.4)"
    cmds:
      - task: bump
        vars:
          GH_REPO: foundry-linux/foundry-devbox
          SRC_DIR: foundry-devbox
          WORK_DIR: /tmp/foundry-devbox-sync

  # ─────────────────────────────────────────────────────────────────────
  # foundry-iso/ — mirror to github.com/foundry-linux/foundry-iso.
  # Same sync/release/bump triple as foundry-apt and foundry-devbox.
  # ─────────────────────────────────────────────────────────────────────

  iso-sync:
    desc: "Sync foundry-iso/ to github.com/foundry-linux/foundry-iso and push"
    cmds:
      - task: sync
        vars:
          GH_REPO: foundry-linux/foundry-iso
          SRC_DIR: foundry-iso
          WORK_DIR: /tmp/foundry-iso-sync

  iso-release:
    desc: "Tag and push a release to trigger ISO build (usage: task iso-release TAG=v0.0.1)"
    requires:
      vars: [TAG]
    cmds:
      - task: release
        vars:
          TAG: '{{.TAG}}'
          GH_REPO: foundry-linux/foundry-iso
          WORK_DIR: /tmp/foundry-iso-sync

  iso-bump:
    desc: "Sync and auto-increment patch tag on foundry-iso (e.g. v0.0.3 → v0.0.4)"
    cmds:
      - task: bump
        vars:
          GH_REPO: foundry-linux/foundry-iso
          SRC_DIR: foundry-iso
          WORK_DIR: /tmp/foundry-iso-sync

  iso-build:
    desc: "Build the ISO locally (EDITION=anvil|atelier, default: anvil)"
    dir: foundry-iso
    cmds:
      - EDITION='{{.EDITION | default "anvil"}}' bash scripts/build-iso.sh

  iso-clean:
    desc: "Clean live-build artifacts and dist/"
    dir: foundry-iso
    cmds:
      - |
        docker run --rm -v "$(pwd):/work" -w /work/config ubuntu:26.04 \
          bash -c 'apt-get install -y live-build -qq && lb clean --purge'
        rm -rf dist/

  iso-smoke:
    desc: "Boot the locally-built ISO in QEMU (EDITION=anvil|atelier, default: anvil)"
    dir: foundry-iso
    cmds:
      - bash test/boot-smoke.sh dist/foundry-{{.EDITION | default "anvil"}}-1.0-amd64.iso

  iso-sign:
    desc: "GPG-sign + SHA-256 the locally-built ISO (EDITION=anvil|atelier)"
    dir: foundry-iso
    cmds:
      - EDITION='{{.EDITION | default "anvil"}}' bash scripts/sign-iso.sh

  iso-build-vms:
    desc: "Build VM images (qcow2, VMDK, OVA) from the anvil ISO"
    dir: foundry-iso
    cmds:
      - bash scripts/build-vm-images.sh

  iso-upload-vms:
    desc: "Upload VM images to R2 (loads creds from .foundry/bootstrap.env)"
    dir: foundry-iso
    cmds:
      - bash scripts/upload-vm-images.sh

  iso-bootstrap-r2:
    desc: "One-time: create foundry-iso R2 bucket + iso.foundrylinux.org binding"
    dir: foundry-iso
    cmds:
      - bash scripts/bootstrap-r2.sh

  iso-generate-index:
    desc: "Generate dist/index.html for iso.foundrylinux.org (from dist/manifest-*.json if present)"
    dir: foundry-iso
    cmds:
      - bash scripts/generate-iso-index.sh

  iso-upload-index:
    desc: "Upload dist/index.html to the foundry-iso R2 bucket (loads creds from .foundry/bootstrap.env)"
    dir: foundry-iso
    cmds:
      - bash scripts/upload-iso-index.sh

  iso-list:
    desc: "List ISOs in R2 and local dist/"
    dir: foundry-iso
    cmds:
      - bash scripts/list-isos.sh

  iso-prune:
    desc: "Prune versioned ISOs from R2. Use KEEP=N or BEFORE=YYYY-MM-DD; DRY_RUN=0 to apply."
    dir: foundry-iso
    cmds:
      - KEEP='{{.KEEP}}' BEFORE='{{.BEFORE}}' DRY_RUN='{{.DRY_RUN | default "1"}}' bash scripts/prune-isos.sh
